services:
  # Redis for Bull Queue
  redis:
    image: redis:7-alpine
    container_name: lanita-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: lanita-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: lanita
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # NestJS Backend
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: lanita-server
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/lanita
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-production}
      NODE_ENV: ${NODE_ENV:-development}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ML_SERVICE_URL: http://ml-service:5000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
    ports:
      - "${API_PORT:-4001}:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # Next.js Frontend
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: lanita-client
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:4001}
    ports:
      - "${WEB_PORT:-4000}:3001"
    depends_on:
      - server
    restart: unless-stopped

  # Python ML Microservice
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: lanita-ml
    environment:
      MODEL_PATH: /app/trained_models/dropout_classifier.pkl
    ports:
      - "${ML_PORT:-5000}:5000"
    volumes:
      - ml_models:/app/trained_models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  ml_models:
