# Development override: hot reload via volume mounts
# Run with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      # Polling for file watching (required for hot reload in Docker / Windows)
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:4001}
    command: ["sh", "-c", "npm install --legacy-peer-deps && npm run dev -- --webpack"]
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      # Polling for file watching (required for hot reload in Docker / Windows)
      WATCHPACK_POLLING: "true"

volumes:
  server_node_modules:
  client_node_modules:
